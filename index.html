<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Activity Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📚 Student Activity Tracker</h1>

        <button onclick="toggleDarkMode()" id="darkBtn">🌙 Dark Mode</button>

        <p>Track your daily learning progress easily!</p>

        <input type="text" id="searchInput" 
               placeholder="Search tasks..." 
               onkeyup="searchTask()">

        <div class="task-input">
            <input type="text" id="taskInput" placeholder="Enter new task...">
            <input type="date" id="dueDate">
            <select id="priorityInput">
                <option value="High">🔴 High</option>
                <option value="Medium">🟡 Medium</option>
                <option value="Low">🟢 Low</option>
            </select>
            <button onclick="addTask()">Add</button>
        </div>

        <div class="filters">
            <button onclick="filterTasks('all')">All</button>
            <button onclick="filterTasks('completed')">Completed</button>
            <button onclick="filterTasks('pending')">Pending</button>
        </div>

        <div id="progressBox">
            <h3 id="progressText">0 out of 0 completed</h3>
            <div class="progress-bar">
                <div id="progressFill"></div>
            </div>
        </div>

        <ul id="activityList"></ul>

    </div>

    <script src="script.js"></script>
</body>
</html>
